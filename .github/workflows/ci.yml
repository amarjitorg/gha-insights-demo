name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run lint

  # ~24 parallel jobs across a variety of runner OS / version / architecture.
  # (Free plan has no larger-size hosted runners, so we vary OS + arch instead.)
  test-matrix:
    name: test / ${{ matrix.runner }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20]
        runner:
          - ubuntu-latest       # Linux x64
          - ubuntu-24.04        # Linux x64
          - ubuntu-22.04        # Linux x64
          - ubuntu-24.04-arm    # Linux ARM64
          - ubuntu-22.04-arm    # Linux ARM64
          - windows-latest      # Windows x64
          - windows-2025        # Windows x64
          - windows-2022        # Windows x64
          - macos-latest        # macOS ARM64 (Apple Silicon)
          - macos-15            # macOS ARM64
          - macos-14            # macOS ARM64
          - macos-13            # macOS x64 (Intel)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Runner info
        run: node -e "console.log('platform=' + process.platform, 'arch=' + process.arch, 'cpus=' + require('os').cpus().length)"
      - name: Run tests
        run: npm test

  # A single job with ~25 sequential steps
  pipeline:
    name: Long pipeline (25 steps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Step 01 - Environment info
        run: node --version && npm --version
      - name: Step 02 - Show working tree
        run: ls -la
      - name: Step 03 - Verify package.json
        run: cat package.json
      - name: Step 04 - Lint index
        run: node --check src/index.js
      - name: Step 05 - Lint math
        run: node --check src/math.js
      - name: Step 06 - Run unit tests
        run: npm test
      - name: Step 07 - Run app
        run: npm start
      - name: Step 08 - Check add()
        run: node -e "import('./src/math.js').then(m => process.exit(m.add(2,3)===5?0:1))"
      - name: Step 09 - Check subtract()
        run: node -e "import('./src/math.js').then(m => process.exit(m.subtract(9,4)===5?0:1))"
      - name: Step 10 - Check multiply()
        run: node -e "import('./src/math.js').then(m => process.exit(m.multiply(6,7)===42?0:1))"
      - name: Step 11 - Check divide()
        run: node -e "import('./src/math.js').then(m => process.exit(m.divide(20,5)===4?0:1))"
      - name: Step 12 - Check factorial()
        run: node -e "import('./src/math.js').then(m => process.exit(m.factorial(5)===120?0:1))"
      - name: Step 13 - Simulate build A
        run: echo "Building module A..." && sleep 2
      - name: Step 14 - Simulate build B
        run: echo "Building module B..." && sleep 2
      - name: Step 15 - Simulate build C
        run: echo "Building module C..." && sleep 2
      - name: Step 16 - Package artifacts
        run: echo "Packaging..." && sleep 1
      - name: Step 17 - Generate report
        run: echo "report generated at $(date)" > report.txt && cat report.txt
      - name: Step 18 - Validate report
        run: test -s report.txt
      - name: Step 19 - Checksum sources
        run: shasum src/*.js
      - name: Step 20 - Count lines of code
        run: wc -l src/*.js test/*.js
      - name: Step 21 - Smoke test
        run: node src/index.js | grep -q "gha-insights-demo"
      - name: Step 22 - Simulate integration test
        run: echo "integration OK" && sleep 2
      - name: Step 23 - Simulate deploy dry-run
        run: echo "deploy dry-run OK" && sleep 1
      - name: Step 24 - Cleanup
        run: rm -f report.txt && echo "cleaned"
      - name: Step 25 - Done
        run: echo "Pipeline complete ✅"

  build:
    name: Build
    needs: [lint, test-matrix, pipeline]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm start
